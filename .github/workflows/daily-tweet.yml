name: NexusLoot Daily Twitter Bot

on:
  schedule:
    # Runs automatically at 14:00 UTC (10:00 AM EST) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  tweet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./twitter-bot
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Twitter Bot
        env:
          # These must be set in your GitHub Repository Settings -> Secrets and variables -> Actions
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: npm start
