</head>
<body>
    <div id="popunder-root" onclick="handlePopunder(event)">
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 bg-nexus-dark/90 backdrop-blur-md border-b border-nexus-border">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                        <i class="fa-solid fa-bolt-lightning text-epic text-2xl drop-shadow-[0_0_8px_#8B5CF6]"></i>
                        <span class="font-display text-xl tracking-tighter italic uppercase text-white">Nexus<span class="text-epic">Loot</span></span>
                    </div>
                    <div class="flex gap-4 sm:gap-8">
                        <button onclick="switchTab('giveaways')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest py-5 border-b-2 border-transparent hover:text-white" data-tab="giveaways">Loot Drop</button>
                        <button onclick="switchTab('terminal')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest py-5 border-b-2 border-transparent hover:text-white" data-tab="terminal">Omni-Terminal</button>
                        <button onclick="switchTab('valorant')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest transition-all py-5 border-b-2 border-transparent hover:text-white" data-tab="valorant">Valorant</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- AD SLOT A: TOP BANNER -->
            <div class="mb-12 flex flex-col items-center gap-2">
                <div class="w-full max-w-[728px] min-h-[90px] bg-white/[0.03] rounded-xl flex items-center justify-center relative group overflow-hidden">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : '8017a00a59f4a8ef137f11a0ad5b4039',
                            'format' : 'iframe',
                            'height' : 90,
                            'width' : 728,

                        };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/8017a00a59f4a8ef137f11a0ad5b4039/invoke.js"></script>
                </div>
                <span class="text-[7px] uppercase tracking-widest text-white/10 italic">Sponsored Neural Interface</span>
            </div>

            <!-- Application View Mount -->
            <div id="app-view"></div>
        </main>

        <footer class="border-t border-nexus-border py-16 mt-32 bg-black/40 text-center">
            <div class="max-w-7xl mx-auto px-4">
                <h4 class="font-display text-lg mb-4 italic uppercase">NEXUS<span class="text-epic">LOOT</span></h4>
                <p class="text-[9px] text-white/20 uppercase tracking-[0.2em]">© 2026 Innovation Initiative Hub // Omni-Game Traffic Terminal</p>
            </div>
        </footer>
    </div>

    <!-- SCRIPT ENGINE -->
    <script>
        const VIEWS = {
            giveaways: { api: 'https://www.gamerpower.com/api/giveaways', render: renderGiveaways },
            valorant: { api: ['https://valorant-api.com/v1/weapons', 'https://valorant-api.com/v1/bundles'], render: renderValorant },
            terminal: { api: 'https://fortnite-api.com/v2/shop/br', render: renderTerminal }
        };

        let currentTab = '';
        let valorantCache = null;

        async function nexusFetch(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.json();
                throw new Error('Direct fetch failed');
            } catch (err) {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const proxyResponse = await fetch(proxyUrl);
                const proxyData = await proxyResponse.json();
                return JSON.parse(proxyData.contents);
            }
        }

        async function switchTab(tabId) {
            if (currentTab === tabId) return;
            currentTab = tabId;
            
            document.querySelectorAll('.tab-link').forEach(l => l.classList.toggle('tab-active', l.dataset.tab === tabId));
            const mount = document.getElementById('app-view');
            mount.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-8">${Array(8).fill(0).map(() => `<div class="h-80 bg-white/[0.02] rounded-3xl shimmer border border-white/5"></div>`).join('')}</div>`;

            try {
                const config = VIEWS[tabId];
                let data;
                if (Array.isArray(config.api)) {
                    data = await Promise.all(config.api.map(url => nexusFetch(url)));
                    if (tabId === 'valorant') valorantCache = data[0].data;
                } else {
                    data = await nexusFetch(config.api);
                }
                config.render(data);
            } catch (err) {
                console.error('NexusEngine Error:', err);
                mount.innerHTML = `<div class="py-32 text-center"><i class="fa-solid fa-circle-exclamation text-epic text-5xl mb-6"></i><h2 class="font-display text-2xl uppercase tracking-tighter text-white">Sync Interrupted</h2><p class="text-white/30 text-[10px] mt-4 uppercase tracking-[0.4em] italic text-center">Neural-link failed.</p></div>`;
            }
        }

        // --- TERMINAL RENDER (Fortnite Shop + eSports + Drops) ---
        function renderTerminal(fortniteData) {
            const mount = document.getElementById('app-view');
            
            let html = `
                <div class="mb-20 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div class="flex flex-col lg:flex-row justify-between items-end gap-8 mb-12">
                        <div>
                            <h2 class="font-display text-5xl text-white uppercase tracking-tighter italic">Omni <span class="text-epic">Terminal</span></h2>
                            <p class="text-[9px] text-white/30 uppercase tracking-[0.5em] mt-3 font-bold italic">Global Shop Rotations & Pro Circuit Telemetry</p>
                        </div>
                    </div>

                    <!-- SUB-TABS -->
                    <div class="flex gap-4 mb-12 overflow-x-auto no-scrollbar">
                        <button onclick="document.getElementById('fortnite-section').scrollIntoView({behavior:'smooth'})" class="whitespace-nowrap px-8 py-4 glass-card bg-white/[0.02] rounded-2xl border border-white/5 text-[10px] font-black uppercase tracking-widest text-epic hover:bg-epic/10 transition-all"><i class="fa-solid fa-cart-shopping mr-3"></i> Fortnite Shop</button>
                        <button onclick="document.getElementById('esports-section').scrollIntoView({behavior:'smooth'})" class="whitespace-nowrap px-8 py-4 glass-card bg-white/[0.02] rounded-2xl border border-white/5 text-[10px] font-black uppercase tracking-widest text-free hover:bg-free/10 transition-all"><i class="fa-solid fa-trophy mr-3"></i> Pro Matches</button>
                        <button onclick="document.getElementById('drops-section').scrollIntoView({behavior:'smooth'})" class="whitespace-nowrap px-8 py-4 glass-card bg-white/[0.02] rounded-2xl border border-white/5 text-[10px] font-black uppercase tracking-widest text-legendary hover:bg-legendary/10 transition-all"><i class="fa-brands fa-twitch mr-3"></i> Twitch Drops</button>
                    </div>

                    <!-- FORTNITE SECTION -->
                    <div id="fortnite-section" class="mb-24">
                        <div class="flex items-center gap-4 mb-10">
                            <div class="h-px flex-grow bg-white/5"></div>
                            <h3 class="text-xs font-black uppercase tracking-[0.5em] text-white/40">Fortnite Daily Rotation</h3>
                            <div class="h-px flex-grow bg-white/5"></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            `;

            const entries = fortniteData.data?.featured?.entries || fortniteData.data?.daily?.entries || [];
            entries.slice(0, 10).forEach(entry => {
                const item = entry.items[0];
                html += `
                    <div class="glass-card bg-nexus-surface rounded-3xl overflow-hidden border border-white/5 group hover:border-epic/40 transition-all duration-500">
                        <div class="relative aspect-square overflow-hidden bg-gradient-to-br from-epic/10 to-transparent">
                            <img src="${item.images.featured || item.images.icon}" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute bottom-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-lg text-[9px] font-black text-white flex items-center gap-2">
                                <i class="fa-solid fa-v"></i> ${entry.finalPrice}
                            </div>
                        </div>
                        <div class="p-5">
                            <h4 class="text-[10px] font-bold text-white uppercase truncate">${item.name}</h4>
                            <p class="text-[7px] text-white/30 uppercase mt-1 tracking-widest font-black">${item.rarity.value}</p>
                        </div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>

                    <!-- ESPORTS SECTION -->
                    <div id="esports-section" class="mb-24">
                         <div class="flex items-center gap-4 mb-10">
                            <div class="h-px flex-grow bg-white/5"></div>
                            <h3 class="text-xs font-black uppercase tracking-[0.5em] text-free/60">Pro Match Circuit</h3>
                            <div class="h-px flex-grow bg-white/5"></div>
                        </div>
                        <div class="bg-white/[0.02] rounded-[3rem] p-10 border border-white/5">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="p-8 border border-white/5 rounded-3xl bg-white/[0.02] flex items-center justify-between group hover:border-free/40 transition-all">
                                    <div class="flex items-center gap-6">
                                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center font-display italic text-white">NAVI</div>
                                        <span class="text-white/20 font-black italic">VS</span>
                                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center font-display italic text-white">G2</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-[8px] font-black text-free uppercase tracking-widest mb-1 animate-pulse">● LIVE NOW</div>
                                        <div class="text-xs font-bold text-white tracking-widest">1 : 0</div>
                                    </div>
                                </div>
                                <div class="p-8 border border-white/5 rounded-3xl bg-white/[0.02] flex items-center justify-between group hover:border-epic/40 transition-all opacity-50">
                                    <div class="flex items-center gap-6">
                                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center font-display italic text-white">Faze</div>
                                        <span class="text-white/20 font-black italic">VS</span>
                                        <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center font-display italic text-white">VIT</div>
                                    </div>
                                    <div class="text-right">
                                        <div class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">Upcoming</div>
                                        <div class="text-[10px] font-bold text-white tracking-widest italic">18:30 UTC</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TWITCH DROPS SECTION -->
                    <div id="drops-section">
                        <div class="flex items-center gap-4 mb-10">
                            <div class="h-px flex-grow bg-white/5"></div>
                            <h3 class="text-xs font-black uppercase tracking-[0.5em] text-legendary/60">Active Twitch Drops</h3>
                            <div class="h-px flex-grow bg-white/5"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white/[0.02] p-8 rounded-[2.5rem] border border-white/5 flex items-center gap-8 group hover:border-legendary/40 transition-all">
                                <div class="w-24 h-24 bg-white/5 rounded-3xl overflow-hidden flex-shrink-0">
                                    <img src="https://static-cdn.jtvnw.net/ttv-boxart/263490_IGDB-285x380.jpg" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h4 class="font-display text-xl text-white uppercase italic">Rust <span class="text-legendary">Global Drops</span></h4>
                                    <p class="text-[9px] text-white/30 uppercase tracking-widest mt-2 font-black">Ends in 2 days // 4 Skins Available</p>
                                    <a href="https://twitch.tv/drops/campaigns" target="_blank" class="inline-block mt-6 text-[8px] font-black text-legendary uppercase tracking-[0.3em] hover:text-white transition-colors">Claim on Twitch →</a>
                                </div>
                            </div>
                            <div class="bg-white/[0.02] p-8 rounded-[2.5rem] border border-white/5 flex items-center gap-8 group hover:border-epic/40 transition-all">
                                <div class="w-24 h-24 bg-white/5 rounded-3xl overflow-hidden flex-shrink-0">
                                    <img src="https://static-cdn.jtvnw.net/ttv-boxart/511224-285x380.jpg" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h4 class="font-display text-xl text-white uppercase italic">Apex <span class="text-epic">Legends</span></h4>
                                    <p class="text-[9px] text-white/30 uppercase tracking-widest mt-2 font-black">ALGS Playoffs // Rare Holospray</p>
                                    <a href="https://twitch.tv/drops/campaigns" target="_blank" class="inline-block mt-6 text-[8px] font-black text-epic uppercase tracking-[0.3em] hover:text-white transition-colors">Claim on Twitch →</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            mount.innerHTML = html;
        }

        // --- VALORANT RENDER ---
        function renderValorant(responses) {
            const weapons = responses[0].data;
            const bundles = responses[1].data;
            const mount = document.getElementById('app-view');
            let html = `<div class="mb-20"><h2 class="font-display text-4xl text-legendary mb-12 uppercase tracking-tighter italic text-center md:text-left">Elite Collections</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-12">`;
            bundles.slice(0, 4).forEach(b => {
                html += `<div class="relative rounded-[3rem] overflow-hidden aspect-video border border-white/5 group card-glow"><img src="${b.displayIcon}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-[2s] text-white"><div class="absolute inset-0 bg-gradient-to-t from-nexus-dark via-transparent to-transparent"></div><div class="absolute bottom-0 left-0 p-10"><h3 class="font-display text-4xl uppercase tracking-tighter text-white">${b.displayName}</h3></div></div>`;
            });
            html += `</div></div><h2 class="font-display text-4xl text-epic mb-12 uppercase tracking-tighter italic text-center md:text-left text-white">The Arsenal</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-8">`;
            weapons.forEach(w => {
                html += `<div class="glass-card bg-nexus-surface rounded-[2.5rem] p-10 border border-white/5 hover:border-epic/40 transition-all card-glow group flex flex-col items-center text-center"><div class="h-32 flex items-center justify-center mb-8"><img src="${w.displayIcon}" class="max-h-full max-w-full object-contain group-hover:scale-125 transition-transform duration-700 drop-shadow-[0_15px_25px_rgba(139,92,246,0.3)]"></div><h3 class="font-display text-sm uppercase tracking-widest text-white">${w.displayName}</h3><button onclick="openSkinLibrary('${w.uuid}')" class="mt-8 text-[8px] font-black text-white/30 uppercase tracking-[0.4em] hover:text-epic transition-colors">Skin Library →</button></div>`;
            });
            mount.innerHTML = html + `</div>`;
        }

        window.openSkinLibrary = (weaponUuid) => {
            const weapon = valorantCache.find(w => w.uuid === weaponUuid);
            if (!weapon) return;
            const modal = document.createElement('div');
            modal.id = 'skin-modal';
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-10 animate-in fade-in duration-300';
            modal.innerHTML = `<div class="absolute inset-0 bg-nexus-dark/95 backdrop-blur-3xl" onclick="closeModal()"></div><div class="relative w-full max-w-6xl max-h-full overflow-y-auto glass-card rounded-[3rem] border-white/10 p-8 sm:p-16 animate-in slide-in-from-bottom-8 duration-500"><button onclick="closeModal()" class="absolute top-8 right-8 text-white/40 hover:text-white transition-colors text-2xl"><i class="fa-solid fa-xmark"></i></button><div class="mb-12 text-white"><h2 class="font-display text-5xl uppercase tracking-tighter italic text-epic">${weapon.displayName} // <span class="text-white/40">Skin Archives</span></h2></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">${weapon.skins.filter(s => !s.displayName.includes('Standard')).map(skin => `<div class="glass-card bg-white/[0.02] rounded-3xl p-8 border-white/5 hover:border-epic/30 transition-all group"><div class="h-32 flex items-center justify-center mb-6"><img src="${skin.displayIcon}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition-transform duration-500"></div><h3 class="font-display text-xs uppercase tracking-widest text-center text-white/60">${skin.displayName}</h3></div>`).join('')}</div></div>`;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            const modal = document.getElementById('skin-modal');
            if (modal) modal.remove();
            document.body.style.overflow = 'auto';
        };

        // --- GIVEAWAYS RENDER ---
        function renderGiveaways(data) {
            const mount = document.getElementById('app-view');
            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-10">`;
            data.forEach((d, index) => {
                if (index === 6) {
                    html += `<div class="md:col-span-3 flex justify-center py-10"><div id="container-5b93a4944853444dddf3758e49112d9e" class="w-full glass-card rounded-[3rem] p-4 border-dashed border-white/10 text-center"><p class="text-[8px] uppercase tracking-widest text-white/20 mb-4 font-bold italic">Recommended Asset Expansion</p><div id="native-ad-mount"></div></div></div>`;
                }
                html += `
                    <div class="glass-card bg-nexus-surface rounded-[3rem] overflow-hidden border border-free/10 hover:border-free transition-all duration-700 card-glow flex flex-col group">
                        <div class="relative aspect-video overflow-hidden">
                            <img src="${d.thumbnail}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                            <div class="absolute top-6 left-6 bg-free text-nexus-dark text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-2xl">Loot Available</div>
                        </div>
                        <div class="p-10 flex flex-col flex-grow text-left">
                            <div class="flex items-center gap-3 mb-6"><span class="text-[8px] font-bold text-free uppercase tracking-widest border border-free/20 px-3 py-1 rounded-full bg-free/5">${d.platforms}</span></div>
                            <h3 class="font-display text-2xl uppercase tracking-tighter mb-4 leading-none group-hover:text-free transition-colors text-white">${d.title}</h3>
                            <p class="text-xs text-white/30 leading-relaxed line-clamp-3 mb-10 tracking-wide">${d.description}</p>
                            <a href="${d.open_giveaway_url}" target="_blank" class="block w-full py-5 bg-free hover:bg-emerald-400 text-nexus-dark font-black text-center text-[10px] uppercase tracking-[0.3em] rounded-2xl transition-all shadow-2xl popunder-trigger">Access Loot Vault</a>
                        </div>
                    </div>
                `;
            });
            mount.innerHTML = html + `</div>`;
            const adContainer = document.getElementById('native-ad-mount');
            if (adContainer) {
                const script = document.createElement('script');
                script.async = true; script.dataset.cfasync = "false";
                script.src = "https://pl29600984.effectivecpmnetwork.com/5b93a4944853444dddf3758e49112d9e/invoke.js";
                adContainer.appendChild(script);
            }
        }

        function handlePopunder(e) {
            if (e.target.closest('.popunder-trigger')) {
                console.log('NexusPop: Security handshake authorized...');
            }
        }

        switchTab('giveaways');
    </script>
    <!-- Adsterra Social Bar -->
    <script src="https://pl29600983.effectivecpmnetwork.com/d9/67/3b/d9673b40062c8e70dbcb40185a13054f.js"></script>
</body>
