        let currentTab = '';
        let valorantCache = null;

        async function nexusFetch(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.json();
                throw new Error('Direct fetch failed');
            } catch (err) {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const proxyResponse = await fetch(proxyUrl);
                const proxyData = await proxyResponse.json();
                return JSON.parse(proxyData.contents);
            }
        }

        async function switchTab(tabId, pushState = true) {
            if (currentTab === tabId) return;
            currentTab = tabId;

            const config = VIEWS[tabId];
            if (pushState && config.path) {
                history.pushState({ tabId }, '', config.path);
            }

            document.querySelectorAll('.tab-link').forEach(l => l.classList.toggle('tab-active', l.dataset.tab === tabId));
            const mount = document.getElementById('app-view');
            mount.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-8">${Array(8).fill(0).map(() => `<div class="h-80 bg-white/[0.02] rounded-3xl shimmer border border-white/5"></div>`).join('')}</div>`;

            try {
                let data = null;

                if (config.api) {
                    if (Array.isArray(config.api)) {
                        data = await Promise.all(config.api.map(url => nexusFetch(url)));
                        if (tabId === 'valorant') valorantCache = data[0].data;
                    } else {
                        data = await nexusFetch(config.api);
                    }
                }

                config.render(data);
            } catch (err) {
                console.error('NexusEngine Error:', err);
                mount.innerHTML = `<div class="py-32 text-center"><i class="fa-solid fa-circle-exclamation text-epic text-5xl mb-6"></i><h2 class="font-display text-2xl uppercase tracking-tighter text-white">Sync Interrupted</h2><p class="text-white/30 text-[10px] mt-4 uppercase tracking-[0.4em] italic text-center">Neural-link failed.<br><span class="text-[8px] opacity-50">${err.message}</span></p></div>`;
            }
        }

            search.innerHTML = `
                <div class="w-full max-w-4xl">

                    <p class="mt-6 text-[10px] uppercase tracking-[0.5em] text-white/20 text-center italic">Press ESC to abort mission</p>

            `;
            document.body.appendChild(search);
            search.querySelector('input').focus();
            
            const escHandler = (e) => {
                if (e.key === 'Escape') {
                    search.remove();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);

        window.handleGlobalSearch = (val) => {
            if (!val) return;
            const query = val.toLowerCase();
            const overlay = document.getElementById('global-search-overlay');
            
            if (query === 'sens') { switchTab('sens'); if(overlay) overlay.remove(); return; }
            if (query === 'osrs') { switchTab('osrs'); if(overlay) overlay.remove(); return; }
            if (query === 'albion') { switchTab('albion'); if(overlay) overlay.remove(); return; }
            if (query === 'intel' || query === 'meta') { switchTab('intelligence'); if(overlay) overlay.remove(); return; }
            if (query === 'games' || query === 'loot') { switchTab('giveaways'); if(overlay) overlay.remove(); return; }
            
            window.location.href = `/blog/?search=${encodeURIComponent(val)}`;
        };

        });

        function initRouting() {
            const path = window.location.pathname;
            const tabId = Object.keys(VIEWS).find(key => VIEWS[key].path === path) || 'giveaways';
            switchTab(tabId, false);
        }

        initRouting();
