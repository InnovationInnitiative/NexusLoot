<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO META-TAGS -->
    <title>NexusLoot // Steam Market Tracker, Valorant Skins & Free Giveaways</title>
    <meta name="description" content="Check live Steam Community Market price drops, view Valorant skins, and claim free Steam loot. The ultimate real-time gaming trading floor.">
    <meta name="keywords" content="Steam market tracker, CS2 skin prices, Valorant skins live, free Steam keys, Epic Games giveaways, gaming loot tracker">
    <link rel="canonical" href="https://nexusloot.innovationinnitiative.in/">

    <!-- Styles & Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Firebase SDK (Compatibility Version for simplicity in single-file) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'nexus-dark': '#020617',
                        'nexus-surface': '#0f172a',
                        'nexus-border': '#1e293b',
                        'free': '#10B981',
                        'epic': '#8B5CF6',
                        'legendary': '#F59E0B',
                        'drop': '#EF4444'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@700;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tab-active { border-bottom: 2px solid #8B5CF6; color: #8B5CF6; }
        .card-glow:hover { box-shadow: 0 0 30px rgba(139, 92, 246, 0.15); border-color: rgba(139, 92, 246, 0.4); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        /* Trading Floor Styles */
        .market-row { transition: all 0.3s ease; }
        .market-row:hover { background: rgba(255,255,255,0.02); }
        .price-drop { animation: flash-red 2s infinite; }
        @keyframes flash-red { 0%, 100% { color: #f8fafc; } 50% { color: #EF4444; } }
    </style>
</head>
<body>
    <div id="popunder-root" onclick="handlePopunder(event)">
        <!-- Navigation -->
        <nav class="sticky top-0 z-50 bg-nexus-dark/90 backdrop-blur-md border-b border-nexus-border">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                        <i class="fa-solid fa-bolt-lightning text-epic text-2xl drop-shadow-[0_0_8px_#8B5CF6]"></i>
                        <span class="font-display text-xl tracking-tighter italic uppercase text-white">Nexus<span class="text-epic">Loot</span></span>
                    </div>
                    <div class="flex gap-4 sm:gap-8">
                        <button onclick="switchTab('giveaways')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest py-5 border-b-2 border-transparent hover:text-white" data-tab="giveaways">Loot Drop</button>
                        <button onclick="switchTab('steam')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest py-5 border-b-2 border-transparent hover:text-white" data-tab="steam">Steam Market</button>
                        <button onclick="switchTab('valorant')" class="tab-link text-[10px] sm:text-xs font-bold uppercase tracking-widest transition-all py-5 border-b-2 border-transparent hover:text-white" data-tab="valorant">Valorant</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- AD SLOT A: TOP BANNER -->
            <div class="mb-12 flex flex-col items-center gap-2">
                <div class="w-full max-w-[728px] min-h-[90px] bg-white/[0.03] rounded-xl flex items-center justify-center relative group overflow-hidden">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : '8017a00a59f4a8ef137f11a0ad5b4039',
                            'format' : 'iframe',
                            'height' : 90,
                            'width' : 728,
                            'params' : {}
                        };
                    </script>
                    <script type="text/javascript" src="https://www.highperformanceformat.com/8017a00a59f4a8ef137f11a0ad5b4039/invoke.js"></script>
                </div>
                <span class="text-[7px] uppercase tracking-widest text-white/10 italic">Sponsored Neural Interface</span>
            </div>

            <!-- Application View Mount -->
            <div id="app-view"></div>
        </main>

        <footer class="border-t border-nexus-border py-16 mt-32 bg-black/40 text-center">
            <div class="max-w-7xl mx-auto px-4">
                <h4 class="font-display text-lg mb-4 italic uppercase">NEXUS<span class="text-epic">LOOT</span></h4>
                <p class="text-[9px] text-white/20 uppercase tracking-[0.2em]">© 2026 Innovation Initiative Hub // Full-Stack Gaming Index</p>
            </div>
        </footer>
    </div>

    <!-- SCRIPT ENGINE -->
    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyCkVuNPu4799F9HZzX3Yxc-AY9C07oTgOo",
            authDomain: "nexusloot-9b305.firebaseapp.com",
            databaseURL: "https://nexusloot-9b305-default-rtdb.firebaseio.com",
            projectId: "nexusloot-9b305",
            storageBucket: "nexusloot-9b305.firebasestorage.app",
            messagingSenderId: "426862990535",
            appId: "1:426862990535:web:3a606f3b5e414fb1ea1ae2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const VIEWS = {
            giveaways: { api: 'https://www.gamerpower.com/api/giveaways', render: renderGiveaways },
            valorant: { api: ['https://valorant-api.com/v1/weapons', 'https://valorant-api.com/v1/bundles'], render: renderValorant },
            steam: { type: 'firebase', render: renderSteam }
        };

        let currentTab = '';
        let valorantCache = null;
        let steamData = []; // Store raw firebase data for re-rendering
        
        // --- CURRENCY, FILTER & SORT STATE ---
        let selectedCurrency = 'USD';
        let profitThreshold = 30;
        let steamSearchQuery = '';
        let selectedCategory = 'All';
        let sortConfig = { key: 'profit', direction: 'desc' };
        let exchangeRates = { USD: 1, INR: 83.5, EUR: 0.92, GBP: 0.79, BRL: 5.15 };

        async function fetchExchangeRates() {
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await res.json();
                if (data && data.rates) {
                    exchangeRates = data.rates;
                    console.log('Currency Rates Updated:', exchangeRates);
                }
            } catch (err) {
                console.error('ExchangeRate API Error:', err);
            }
        }
        fetchExchangeRates();

        function formatCurrency(usdAmount, currency) {
            const rate = exchangeRates[currency] || 1;
            const amount = usdAmount * rate;
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: currency,
                minimumFractionDigits: 2
            }).format(amount);
        }

        async function nexusFetch(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.json();
                throw new Error('Direct fetch failed');
            } catch (err) {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const proxyResponse = await fetch(proxyUrl);
                const proxyData = await proxyResponse.json();
                return JSON.parse(proxyData.contents);
            }
        }

        async function switchTab(tabId) {
            if (currentTab === tabId) return;
            currentTab = tabId;
            
            document.querySelectorAll('.tab-link').forEach(l => l.classList.toggle('tab-active', l.dataset.tab === tabId));
            const mount = document.getElementById('app-view');
            mount.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-8">${Array(8).fill(0).map(() => `<div class="h-80 bg-white/[0.02] rounded-3xl shimmer border border-white/5"></div>`).join('')}</div>`;

            try {
                const config = VIEWS[tabId];
                if (config.type === 'firebase') {
                    db.ref('steam_market').on('value', (snapshot) => {
                        if (currentTab !== 'steam') return;
                        const data = snapshot.val();
                        steamData = data ? Object.values(data) : [];
                        renderSteam(steamData);
                    }, (error) => {
                        console.error('Firebase Read Error:', error);
                        mount.innerHTML = `<div class="py-32 text-center"><i class="fa-solid fa-shield-halved text-epic text-5xl mb-6"></i><h2 class="font-display text-2xl uppercase tracking-tighter">Access Denied</h2><p class="text-white/30 text-[10px] mt-4 uppercase tracking-[0.4em] italic text-center">Firebase Security Rules are blocking the terminal.</p></div>`;
                    });
                } else {
                    let data;
                    if (Array.isArray(config.api)) {
                        data = await Promise.all(config.api.map(url => nexusFetch(url)));
                        if (tabId === 'valorant') valorantCache = data[0].data;
                    } else {
                        data = await nexusFetch(config.api);
                    }
                    config.render(data);
                }
            } catch (err) {
                console.error('NexusEngine Error:', err);
                mount.innerHTML = `<div class="py-32 text-center"><i class="fa-solid fa-circle-exclamation text-epic text-5xl mb-6"></i><h2 class="font-display text-2xl uppercase tracking-tighter text-white">Sync Interrupted</h2><p class="text-white/30 text-[10px] mt-4 uppercase tracking-[0.4em] italic text-center">Neural-link failed.</p></div>`;
            }
        }

        // --- STEAM TRADING FLOOR ---
        window.updateSteamFilter = (value) => {
            profitThreshold = parseInt(value);
            const display = document.getElementById('threshold-display');
            if (display) display.innerText = `${profitThreshold}%`;
            renderSteam(steamData);
        };

        window.updateCurrency = (value) => {
            selectedCurrency = value;
            renderSteam(steamData);
        };

        window.updateSteamSearch = (query) => {
            steamSearchQuery = query.toLowerCase();
            renderSteam(steamData);
        };

        window.updateCategory = (cat) => {
            selectedCategory = cat;
            renderSteam(steamData);
        };

        window.setSort = (key) => {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'desc';
            }
            renderSteam(steamData);
        };

        function renderSteam(items) {
            const mount = document.getElementById('app-view');
            if (!items || items.length === 0) {
                mount.innerHTML = `<div class="py-32 text-center uppercase tracking-[0.5em] text-white/20 text-xs italic">Syncing with Steam Neural-Link... <br/> [Backend Worker is fetching data]</div>`;
                return;
            }

            // 1. FILTERING
            let filtered = items.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(steamSearchQuery);
                const matchesCat = selectedCategory === 'All' || item.category === selectedCategory;
                return matchesSearch && matchesCat;
            });

            // 2. SORTING
            filtered.sort((a, b) => {
                let valA, valB;
                const lowA = parseFloat(a.lowest_price?.replace(/[^0-9.-]+/g,"") || 0);
                const lowB = parseFloat(b.lowest_price?.replace(/[^0-9.-]+/g,"") || 0);
                const medA = parseFloat(a.median_price?.replace(/[^0-9.-]+/g,"") || lowA);
                const medB = parseFloat(b.median_price?.replace(/[^0-9.-]+/g,"") || lowB);

                if (sortConfig.key === 'name') {
                    valA = a.name; valB = b.name;
                } else if (sortConfig.key === 'price') {
                    valA = lowA; valB = lowB;
                } else if (sortConfig.key === 'profit') {
                    valA = medA > 0 ? (medA - lowA) / medA : -1;
                    valB = medB > 0 ? (medB - lowB) / medB : -1;
                }

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            const categories = ['All', 'Case', 'Rifle', 'Sniper', 'Pistol', 'SMG'];

            let html = `
                <div class="mb-12 flex flex-col gap-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-8">
                        <div>
                            <h2 class="font-display text-5xl text-white uppercase tracking-tighter italic">Open Market <span class="text-epic">// Asset Index</span></h2>
                            <p class="text-[9px] text-white/30 uppercase tracking-[0.5em] mt-3 font-bold">Real-time Trading Floor & Arbitrage Terminal</p>
                        </div>
                        
                        <div class="flex flex-wrap gap-4 w-full lg:w-auto justify-end items-center">
                            <!-- Currency -->
                            <div class="glass-card px-4 py-3 rounded-2xl border-white/5">
                                <select onchange="updateCurrency(this.value)" class="bg-transparent text-[10px] font-black uppercase tracking-widest text-white outline-none cursor-pointer">
                                    <option value="USD" ${selectedCurrency === 'USD' ? 'selected' : ''} class="bg-nexus-dark">USD ($)</option>
                                    <option value="INR" ${selectedCurrency === 'INR' ? 'selected' : ''} class="bg-nexus-dark">INR (₹)</option>
                                    <option value="EUR" ${selectedCurrency === 'EUR' ? 'selected' : ''} class="bg-nexus-dark">EUR (€)</option>
                                    <option value="GBP" ${selectedCurrency === 'GBP' ? 'selected' : ''} class="bg-nexus-dark">GBP (£)</option>
                                    <option value="BRL" ${selectedCurrency === 'BRL' ? 'selected' : ''} class="bg-nexus-dark">BRL (R$)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Market Controls -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="relative group">
                            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-epic transition-colors"></i>
                            <input type="text" placeholder="Search Skins or Cases..." oninput="updateSteamSearch(this.value)" value="${steamSearchQuery}" 
                                class="w-full bg-nexus-surface/50 border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-xs text-white placeholder:text-white/10 outline-none focus:border-epic/50 transition-all">
                        </div>
                        
                        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2 lg:pb-0">
                            ${categories.map(cat => `
                                <button onclick="updateCategory('${cat}')" class="px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${selectedCategory === cat ? 'bg-epic text-white shadow-[0_0_20px_rgba(139,92,246,0.4)]' : 'bg-white/5 text-white/40 hover:bg-white/10'}">${cat}</button>
                            `).join('')}
                        </div>

                        <div class="glass-card px-6 py-4 rounded-2xl border-white/5 flex items-center justify-between gap-6">
                            <span class="text-[8px] uppercase tracking-widest text-white/40 font-black">Profit Sensitivity</span>
                            <div class="flex items-center gap-4 flex-grow">
                                <input type="range" min="5" max="50" value="${profitThreshold}" oninput="updateSteamFilter(this.value)" class="accent-epic h-1 flex-grow">
                                <span id="threshold-display" class="text-[10px] font-bold text-epic w-8">${profitThreshold}%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-[3rem] overflow-hidden border-white/5 bg-dark-surface/30">
                    <table class="w-full text-left text-[10px] uppercase tracking-[0.2em]">
                        <thead class="bg-white/[0.03] text-white/40 border-b border-white/5">
                            <tr>
                                <th class="p-8 font-bold cursor-pointer hover:text-white transition-colors" onclick="setSort('name')">Asset Name ${sortConfig.key === 'name' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</th>
                                <th class="p-8 font-bold cursor-pointer hover:text-white transition-colors text-center" onclick="setSort('price')">Market Price ${sortConfig.key === 'price' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</th>
                                <th class="p-8 font-bold text-center">Median Value</th>
                                <th class="p-8 font-bold cursor-pointer hover:text-white transition-colors text-center" onclick="setSort('profit')">Potential Profit ${sortConfig.key === 'profit' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</th>
                                <th class="p-8 font-bold text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-white/5">
            `;

            filtered.forEach((item) => {
                const lowestRaw = item.lowest_price ? item.lowest_price.replace(/[^0-9.-]+/g,"") : "0";
                const medianRaw = item.median_price ? item.median_price.replace(/[^0-9.-]+/g,"") : lowestRaw;
                const lowest = parseFloat(lowestRaw) || 0;
                const median = parseFloat(medianRaw) || 0;
                const diff = (lowest > 0 && median > 0) ? ((median - lowest) / median * 100).toFixed(1) : "0.0";
                const isProfitable = lowest > 0 && diff >= profitThreshold;

                html += `
                    <tr class="market-row group">
                        <td class="p-8">
                            <div class="flex items-center gap-6">
                                <div class="w-12 h-12 flex-shrink-0 bg-white/5 rounded-xl border border-white/5 flex items-center justify-center group-hover:border-epic transition-all p-1.5 overflow-hidden">
                                     <img src="${item.icon_url}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://nexusloot.innovationinnitiative.in/favicon.ico'">
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span class="font-bold text-white/80 group-hover:text-white transition-colors line-clamp-1">${item.name}</span>
                                    <span class="text-[7px] text-white/20 font-black">${item.category}</span>
                                </div>
                            </div>
                        </td>
                        <td class="p-8 font-display text-lg text-white whitespace-nowrap text-center">
                            ${lowest > 0 ? formatCurrency(lowest, selectedCurrency) : '<span class="text-white/10 text-[8px] italic">SYNCING...</span>'}
                        </td>
                        <td class="p-8 text-white/40 whitespace-nowrap text-center">
                            ${median > 0 ? formatCurrency(median, selectedCurrency) : '--'}
                        </td>
                        <td class="p-8 text-center">
                            <span class="${isProfitable ? 'bg-free/20 text-free border border-free/20 px-4 py-2 rounded-xl text-[9px] font-black' : 'text-white/10 italic text-[8px]'}">
                                ${isProfitable ? 'SNIPE: ' + diff + '%' : (lowest > 0 ? diff + '%' : 'OFFLINE')}
                            </span>
                        </td>
                        <td class="p-8 text-right min-w-[160px]">
                            <a href="${item.market_url}" target="_blank" class="inline-block px-6 py-3 bg-white/5 hover:bg-epic transition-all rounded-xl font-black text-[9px] uppercase tracking-widest popunder-trigger whitespace-nowrap">Snipe Asset</a>
                        </td>
                    </tr>
                `;
            });

            if (filtered.length === 0) {
                html += `<tr><td colspan="5" class="py-32 text-center text-white/20 text-[10px] uppercase tracking-[0.5em] italic">No compatible assets found in current sector</td></tr>`;
            }

            html += `</tbody></table></div>`;
            mount.innerHTML = html;
        }

        // --- VALORANT RENDER ---
        function renderValorant(responses) {
            const weapons = responses[0].data;
            const bundles = responses[1].data;
            const mount = document.getElementById('app-view');
            let html = `<div class="mb-20"><h2 class="font-display text-4xl text-legendary mb-12 uppercase tracking-tighter italic text-center md:text-left">Elite Collections</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-12">`;
            bundles.slice(0, 4).forEach(b => {
                html += `<div class="relative rounded-[3rem] overflow-hidden aspect-video border border-white/5 group card-glow"><img src="${b.displayIcon}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-[2s] text-white"><div class="absolute inset-0 bg-gradient-to-t from-nexus-dark via-transparent to-transparent"></div><div class="absolute bottom-0 left-0 p-10"><h3 class="font-display text-4xl uppercase tracking-tighter text-white">${b.displayName}</h3></div></div>`;
            });
            html += `</div></div><h2 class="font-display text-4xl text-epic mb-12 uppercase tracking-tighter italic text-center md:text-left text-white">The Arsenal</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-8">`;
            weapons.forEach(w => {
                html += `<div class="glass-card bg-nexus-surface rounded-[2.5rem] p-10 border border-white/5 hover:border-epic/40 transition-all card-glow group flex flex-col items-center text-center"><div class="h-32 flex items-center justify-center mb-8"><img src="${w.displayIcon}" class="max-h-full max-w-full object-contain group-hover:scale-125 transition-transform duration-700 drop-shadow-[0_15px_25px_rgba(139,92,246,0.3)]"></div><h3 class="font-display text-sm uppercase tracking-widest text-white">${w.displayName}</h3><button onclick="openSkinLibrary('${w.uuid}')" class="mt-8 text-[8px] font-black text-white/30 uppercase tracking-[0.4em] hover:text-epic transition-colors">Skin Library →</button></div>`;
            });
            mount.innerHTML = html + `</div>`;
        }

        window.openSkinLibrary = (weaponUuid) => {
            const weapon = valorantCache.find(w => w.uuid === weaponUuid);
            if (!weapon) return;
            const modal = document.createElement('div');
            modal.id = 'skin-modal';
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-10 animate-in fade-in duration-300';
            modal.innerHTML = `<div class="absolute inset-0 bg-nexus-dark/95 backdrop-blur-3xl" onclick="closeModal()"></div><div class="relative w-full max-w-6xl max-h-full overflow-y-auto glass-card rounded-[3rem] border-white/10 p-8 sm:p-16 animate-in slide-in-from-bottom-8 duration-500"><button onclick="closeModal()" class="absolute top-8 right-8 text-white/40 hover:text-white transition-colors text-2xl"><i class="fa-solid fa-xmark"></i></button><div class="mb-12 text-white"><h2 class="font-display text-5xl uppercase tracking-tighter italic text-epic">${weapon.displayName} // <span class="text-white/40">Skin Archives</span></h2></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">${weapon.skins.filter(s => !s.displayName.includes('Standard')).map(skin => `<div class="glass-card bg-white/[0.02] rounded-3xl p-8 border-white/5 hover:border-epic/30 transition-all group"><div class="h-32 flex items-center justify-center mb-6"><img src="${skin.displayIcon}" class="max-h-full max-w-full object-contain group-hover:scale-110 transition-transform duration-500"></div><h3 class="font-display text-xs uppercase tracking-widest text-center text-white/60">${skin.displayName}</h3></div>`).join('')}</div></div>`;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            const modal = document.getElementById('skin-modal');
            if (modal) modal.remove();
            document.body.style.overflow = 'auto';
        };

        // --- GIVEAWAYS RENDER ---
        function renderGiveaways(data) {
            const mount = document.getElementById('app-view');
            let html = `<div class="grid grid-cols-1 md:grid-cols-3 gap-10">`;
