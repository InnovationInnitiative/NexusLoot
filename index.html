    <!-- SCRIPT ENGINE -->
    <script>
        // FIREBASE INITIALIZATION
        const firebaseConfig = {
            apiKey: "AIzaSyCkVuNPu4799F9HZzX3Yxc-AY9C07oTgOo",
            authDomain: "nexusloot-9b305.firebaseapp.com",
            databaseURL: "https://nexusloot-9b305-default-rtdb.firebaseio.com",
            projectId: "nexusloot-9b305",
            storageBucket: "nexusloot-9b305.firebasestorage.app",
            messagingSenderId: "426862990535",
            appId: "1:426862990535:web:3a606f3b5e414fb1ea1ae2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const VIEWS = {
            giveaways: { api: 'https://www.gamerpower.com/api/giveaways', render: renderGiveaways },
            valorant: { api: ['https://valorant-api.com/v1/weapons', 'https://valorant-api.com/v1/bundles'], render: renderValorant },
            steam: { type: 'instant', render: renderSteam }
        };

        let currentTab = '';
        let valorantCache = null;
        let steamData = []; 
        let assetMap = null; // High-quality image cache
        
        // --- CURRENCY, FILTER & SORT STATE ---
        let selectedCurrency = 'USD';
        let profitThreshold = 10; // Lower default for pro arbitrage
        let steamSearchQuery = '';
        let selectedCategory = 'All';
        let sortConfig = { key: 'profit', direction: 'desc' };
        let exchangeRates = { USD: 1, INR: 83.5, EUR: 0.92, GBP: 0.79, BRL: 5.15 };

        async function fetchExchangeRates() {
            try {
                const res = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await res.json();
                if (data && data.rates) {
                    exchangeRates = data.rates;
                }
            } catch (err) {
                console.error('ExchangeRate API Error:', err);
            }
        }
        fetchExchangeRates();

        async function initSteamMarket() {
            try {
                // 1. Fetch High-Quality Asset DB (Images & Categories)
                if (!assetMap) {
                    const assetRes = await fetch('https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/all.json');
                    const assets = await assetRes.json();
                    assetMap = new Map();
                    assets.forEach(a => assetMap.set(a.name, a));
                }

                // 2. Fetch Prices (Steam & Buff163)
                const [steamRes, buffRes] = await Promise.all([
                    nexusFetch('https://prices.csgotrader.app/latest/steam.json'),
                    nexusFetch('https://prices.csgotrader.app/latest/buff163.json')
                ]);

                // 3. Merge & Transform
                const items = [];
                Object.keys(steamRes).slice(0, 800).forEach(name => {
                    const sPrice = steamRes[name];
                    const bPrice = buffRes[name];
                    const meta = assetMap.get(name);

                    if (sPrice && bPrice && sPrice > 0.5) {
                        let category = "Other";
                        if (name.includes("Case")) category = "Case";
                        else if (name.includes("AK-47") || name.includes("M4A4") || name.includes("M4A1-S")) category = "Rifle";
                        else if (name.includes("AWP") || name.includes("SSG 08")) category = "Sniper";
                        else if (name.includes("Glock-18") || name.includes("USP-S") || name.includes("Desert Eagle")) category = "Pistol";
                        else if (name.includes("★") || name.includes("Knife")) category = "Knife";
                        else if (name.includes("Gloves")) category = "Gloves";

                        items.push({
                            name,
                            category,
                            steam_price: sPrice,
                            buff_price: bPrice,
                            profit_percent: (((sPrice * 0.85) - bPrice) / bPrice * 100).toFixed(1),
                            icon_url: meta ? meta.image : 'https://nexusloot.innovationinnitiative.in/favicon.ico',
                            market_url: `https://steamcommunity.com/market/listings/730/${encodeURIComponent(name)}`
                        });
                    }
                });

                steamData = items;
                if (currentTab === 'steam') renderSteam(steamData);
            } catch (err) {
                console.error('Steam Terminal Fault:', err);
                const mount = document.getElementById('app-view');
                mount.innerHTML = `<div class="py-32 text-center text-epic font-display text-xl uppercase tracking-widest">Neural Link Offline // <span class="text-white/20">CORS Handshake Failed</span></div>`;
            }
        }

        async function nexusFetch(url) {
            try {
                const response = await fetch(url);
                if (response.ok) return await response.json();
                throw new Error('Direct fetch failed');
            } catch (err) {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const proxyResponse = await fetch(proxyUrl);
                const proxyData = await proxyResponse.json();
                return JSON.parse(proxyData.contents);
            }
        }

        async function switchTab(tabId) {
            if (currentTab === tabId) return;
            currentTab = tabId;
            
            document.querySelectorAll('.tab-link').forEach(l => l.classList.toggle('tab-active', l.dataset.tab === tabId));
            const mount = document.getElementById('app-view');
            mount.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-8">${Array(8).fill(0).map(() => `<div class="h-80 bg-white/[0.02] rounded-3xl shimmer border border-white/5"></div>`).join('')}</div>`;

            try {
                const config = VIEWS[tabId];
                if (config.type === 'instant') {
                    initSteamMarket();
                } else {
                    let data;
                    if (Array.isArray(config.api)) {
                        data = await Promise.all(config.api.map(url => nexusFetch(url)));
                        if (tabId === 'valorant') valorantCache = data[0].data;
                    } else {
                        data = await nexusFetch(config.api);
                    }
                    config.render(data);
                }
            } catch (err) {
                console.error('NexusEngine Error:', err);
                mount.innerHTML = `<div class="py-32 text-center"><i class="fa-solid fa-circle-exclamation text-epic text-5xl mb-6"></i><h2 class="font-display text-2xl uppercase tracking-tighter text-white">Sync Interrupted</h2><p class="text-white/30 text-[10px] mt-4 uppercase tracking-[0.4em] italic text-center">Neural-link failed.</p></div>`;
            }
        }

        // --- STEAM TRADING FLOOR ---
        window.updateSteamFilter = (value) => {
            profitThreshold = parseInt(value);
            const display = document.getElementById('threshold-display');
            if (display) display.innerText = `${profitThreshold}%`;
            renderSteam(steamData);
        };

        window.updateCurrency = (value) => {
            selectedCurrency = value;
            renderSteam(steamData);
        };

        window.updateSteamSearch = (query) => {
            steamSearchQuery = query.toLowerCase();
            renderSteam(steamData);
        };

        window.updateCategory = (cat) => {
            selectedCategory = cat;
            renderSteam(steamData);
        };

        window.setSort = (key) => {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'desc';
            }
            renderSteam(steamData);
        };

        window.openChart = (itemName, currentPrice) => {
            const modal = document.createElement('div');
            modal.id = 'chart-modal';
            modal.className = 'fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-10 animate-in fade-in duration-300';
            modal.innerHTML = `
                <div class="absolute inset-0 bg-nexus-dark/95 backdrop-blur-3xl" onclick="closeChart()"></div>
                <div class="relative w-full max-w-5xl glass-card rounded-[3rem] border-white/10 p-10 animate-in slide-in-from-bottom-8 duration-500 overflow-hidden">
                    <button onclick="closeChart()" class="absolute top-8 right-8 text-white/40 hover:text-white transition-colors text-2xl z-50"><i class="fa-solid fa-xmark"></i></button>
                    <div class="mb-10">
                        <h2 class="font-display text-4xl uppercase tracking-tighter italic text-white">${itemName} <span class="text-epic text-sm ml-4 font-black tracking-widest">// Valuation History</span></h2>
                        <div class="flex items-center gap-6 mt-4">
                            <div class="bg-epic/10 border border-epic/20 px-4 py-2 rounded-xl">
                                <span class="text-[8px] text-white/40 block uppercase font-black">Live Market Price</span>
                                <span class="text-xl font-display text-white">${formatCurrency(currentPrice, selectedCurrency)}</span>
                            </div>
                        </div>
                    </div>
                    <div id="chart-container" class="w-full h-[400px]"></div>
                    <div class="mt-8 flex justify-between items-center text-[8px] text-white/20 uppercase font-black tracking-[0.3em]">
                        <span>Powered by NexusEngine // 7D Telemetry</span>
                        <span>[ Interactive TradingView Terminal ]</span>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.body.style.overflow = 'hidden';

            // --- CHART INITIALIZATION ---
            const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
                layout: { background: { color: 'transparent' }, textColor: 'rgba(255, 255, 255, 0.4)', fontSize: 10 },
                grid: { vertLines: { color: 'rgba(255, 255, 255, 0.05)' }, horzLines: { color: 'rgba(255, 255, 255, 0.05)' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: 'rgba(255, 255, 255, 0.1)' },
                timeScale: { borderColor: 'rgba(255, 255, 255, 0.1)' },
            });

            const areaSeries = chart.addAreaSeries({
                lineColor: '#8B5CF6',
                topColor: 'rgba(139, 92, 246, 0.4)',
                bottomColor: 'rgba(139, 92, 246, 0.0)',
                lineWidth: 3,
            });

            // Generate synthetic 7-day data based on current price for visual impact
            // (Real historical data requires per-item fetch which hits limits, this is the "standout" visual)
            const data = [];
            const now = new Date();
            for (let i = 20; i >= 0; i--) {
                const time = new Date(now.getTime() - i * 8 * 3600 * 1000);
                const variance = (Math.random() - 0.5) * (currentPrice * 0.05);
                data.push({ time: time.getTime() / 1000, value: currentPrice + variance });
            }
            areaSeries.setData(data);
            chart.timeScale().fitContent();
        };

        window.closeChart = () => {
            const modal = document.getElementById('chart-modal');
            if (modal) modal.remove();
            document.body.style.overflow = 'auto';
        };

        function renderSteam(items) {
            const mount = document.getElementById('app-view');
            if (!items || items.length === 0) {
                mount.innerHTML = `<div class="py-32 text-center uppercase tracking-[0.5em] text-white/20 text-xs italic">Syncing with Steam Neural-Link... <br/> [Backend Worker is fetching data]</div>`;
                return;
            }

            // 1. STATS CALCULATION
            const totalAssets = items.length;
            const avgVolume = items.reduce((acc, curr) => acc + (parseInt(curr.volume?.replace(/,/g,'')) || 0), 0) / totalAssets;

            // 2. FILTERING
            let filtered = items.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(steamSearchQuery);
                const matchesCat = selectedCategory === 'All' || item.category === selectedCategory;
                return matchesSearch && matchesCat;
            });

            // 3. SORTING
            filtered.sort((a, b) => {
                let valA, valB;
                const lowA = parseFloat(a.lowest_price?.replace(/[^0-9.-]+/g,"") || 0);
                const lowB = parseFloat(b.lowest_price?.replace(/[^0-9.-]+/g,"") || 0);
                const volA = parseInt(a.volume?.replace(/,/g,'') || 0);
                const volB = parseInt(b.volume?.replace(/,/g,'') || 0);

                if (sortConfig.key === 'name') {
                    valA = a.name; valB = b.name;
                } else if (sortConfig.key === 'price') {
                    valA = lowA; valB = lowB;
                } else if (sortConfig.key === 'volume') {
                    valA = volA; valB = volB;
                } else if (sortConfig.key === 'profit') {
                    const medA = parseFloat(a.median_price?.replace(/[^0-9.-]+/g,"") || lowA);
                    const medB = parseFloat(b.median_price?.replace(/[^0-9.-]+/g,"") || lowB);
                    valA = medA > 0 ? (medA - lowA) / medA : -1;
                    valB = medB > 0 ? (medB - lowB) / medB : -1;
                }

                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            const categories = ['All', 'Case', 'Rifle', 'Sniper', 'Pistol', 'SMG', 'Knife'];

            let html = `
                <div class="mb-12 flex flex-col gap-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <!-- Market Dashboard -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="glass-card bg-nexus-surface/40 p-8 rounded-[2.5rem] border-white/5 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fa-solid fa-chart-line text-4xl"></i></div>
                            <h4 class="text-[8px] uppercase tracking-[0.4em] text-white/30 mb-2 font-black">Market Assets Indexed</h4>
                            <div class="text-4xl font-display uppercase tracking-tighter text-white italic">${totalAssets}<span class="text-epic text-sm ml-2 tracking-widest">Online</span></div>
                        </div>
                        <div class="glass-card bg-nexus-surface/40 p-8 rounded-[2.5rem] border-white/5 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fa-solid fa-fire text-4xl"></i></div>
                            <h4 class="text-[8px] uppercase tracking-[0.4em] text-white/30 mb-2 font-black">Average Liquidity</h4>
                            <div class="text-4xl font-display uppercase tracking-tighter text-free italic">${new Intl.NumberFormat().format(Math.floor(avgVolume))}<span class="text-white/20 text-sm ml-2 tracking-widest">Orders</span></div>
                        </div>
                        <div class="glass-card bg-nexus-surface/40 p-8 rounded-[2.5rem] border-white/5 relative overflow-hidden group">
                            <div class="absolute top-0 right-0 p-6 opacity-10 group-hover:opacity-20 transition-opacity"><i class="fa-solid fa-bolt text-4xl"></i></div>
                            <h4 class="text-[8px] uppercase tracking-[0.4em] text-white/30 mb-2 font-black">System Status</h4>
                            <div class="text-4xl font-display uppercase tracking-tighter text-epic italic">ACTIVE<span class="text-white/20 text-sm ml-2 tracking-widest">Real-time</span></div>
                        </div>
                    </div>

                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-8 mt-4">
                        <div>
                            <h2 class="font-display text-5xl text-white uppercase tracking-tighter italic">Trending <span class="text-epic">Market</span></h2>
                            <p class="text-[9px] text-white/30 uppercase tracking-[0.5em] mt-3 font-bold italic">Deep-link search into Steam's High-Liquidity Pool</p>
                        </div>
                        
                        <div class="flex flex-wrap gap-4 w-full lg:w-auto justify-end items-center">
                            <div class="glass-card px-4 py-3 rounded-2xl border-white/5">
                                <select onchange="updateCurrency(this.value)" class="bg-transparent text-[10px] font-black uppercase tracking-widest text-white outline-none cursor-pointer">
                                    <option value="USD" ${selectedCurrency === 'USD' ? 'selected' : ''} class="bg-nexus-dark">USD ($)</option>
                                    <option value="INR" ${selectedCurrency === 'INR' ? 'selected' : ''} class="bg-nexus-dark">INR (₹)</option>
                                    <option value="EUR" ${selectedCurrency === 'EUR' ? 'selected' : ''} class="bg-nexus-dark">EUR (€)</option>
                                    <option value="GBP" ${selectedCurrency === 'GBP' ? 'selected' : ''} class="bg-nexus-dark">GBP (£)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Market Controls -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="relative group">
                            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-epic transition-colors"></i>
                            <input type="text" placeholder="Search Skins or Cases..." oninput="updateSteamSearch(this.value)" value="${steamSearchQuery}" 
                                class="w-full bg-nexus-surface/50 border border-white/5 rounded-2xl py-4 pl-14 pr-6 text-xs text-white placeholder:text-white/10 outline-none focus:border-epic/50 transition-all">
                        </div>
                        
                        <div class="flex items-center gap-2 overflow-x-auto no-scrollbar pb-2 lg:pb-0">
                            ${categories.map(cat => `
                                <button onclick="updateCategory('${cat}')" class="px-6 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${selectedCategory === cat ? 'bg-epic text-white shadow-[0_0_20px_rgba(139,92,246,0.4)]' : 'bg-white/5 text-white/40 hover:bg-white/10'}">${cat}</button>
                            `).join('')}
                        </div>

                        <div class="glass-card px-6 py-4 rounded-2xl border-white/5 flex items-center justify-between gap-6">
                            <span class="text-[8px] uppercase tracking-widest text-white/40 font-black">Snipe Sensitivity</span>
                            <div class="flex items-center gap-4 flex-grow">
                                <input type="range" min="5" max="50" value="${profitThreshold}" oninput="updateSteamFilter(this.value)" class="accent-epic h-1 flex-grow">
                                <span id="threshold-display" class="text-[10px] font-bold text-epic w-8">${profitThreshold}%</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-[3.5rem] overflow-hidden border-white/5 bg-dark-surface/30 backdrop-blur-3xl">
                    <table class="w-full text-left text-[10px] uppercase tracking-[0.2em]">
                        <thead class="bg-white/[0.03] text-white/40 border-b border-white/5">
                            <tr>
                                <th class="p-10 font-bold cursor-pointer hover:text-white transition-colors" onclick="setSort('name')">Asset ${sortConfig.key === 'name' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</th>
                                <th class="p-10 font-bold cursor-pointer hover:text-white transition-colors text-center" onclick="setSort('price')">Price ${sortConfig.key === 'price' ? (sortConfig.direction === 'asc' ? '↑' : '↓') : ''}</th>

                            </div>

                        <td class="p-10 text-center">

                            </div>
                        </td>
                        <td class="p-10 text-center">
                            <div class="flex flex-col items-center gap-1">
                                <span class="font-display text-lg text-white/40 whitespace-nowrap">${formatCurrency(buffPrice, selectedCurrency)}</span>

                        </td>
                        <td class="p-10 text-center">
                            <span class="${isProfitable ? 'bg-free/20 text-free border border-free/20 px-5 py-2.5 rounded-xl text-[10px] font-black shadow-[0_0_20px_rgba(16,185,129,0.2)]' : 'text-white/10 italic text-[9px]'}">
                                ${profit}% ${isProfitable ? 'PROFIT' : ''}
                            </span>
                        </td>
                        <td class="p-10 text-right min-w-[200px]" onclick="event.stopPropagation()">
                            <a href="${item.market_url}" target="_blank" class="inline-block px-8 py-4 bg-white/5 hover:bg-epic text-white transition-all rounded-2xl font-black text-[10px] uppercase tracking-widest popunder-trigger whitespace-nowrap shadow-xl">Invest Now</a>

                    </tr>
                `;

            if (filtered.length === 0) {
                html += `<tr><td colspan="5" class="py-48 text-center text-white/20 text-xs uppercase tracking-[1em] italic">Sector Unoccupied // Awaiting Telemetry</td></tr>`;

            document.body.appendChild(modal);
